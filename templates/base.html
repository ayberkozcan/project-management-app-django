<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Project Management{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/projects">ProjectManager</a>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/projects/">Projects</a>
            <a class="btn btn-outline-light btn-sm" href="/accounts/logout/">Logout</a>
        </div>
    </div>
</nav>

<main class="container my-4 flex-grow-1">
    {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 border-top">
    <small>&copy; Project Management App</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
  const tooltipList = [...tooltipTriggerList].map(
    tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl)
  )
</script>

</body>
</html>
