<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Project Management{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .page-container {
            background: var(--bs-body-bg);
            border-radius: 0.75rem;
            padding: 2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        footer {
            font-size: 0.875rem;
        }

        .theme-toggle {
            cursor: pointer;
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/projects">
            <i class="bi bi-kanban-fill me-2"></i>ProjectManager
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
            <div class="d-flex flex-column flex-lg-row gap-2 mt-3 mt-lg-0">

                <a href="{% url 'signup' %}">Sign up</a>
                <a href="{% url 'login' %}">Log in</a>
                
                <a class="btn btn-outline-light btn-sm" href="/projects/">
                    <i class="bi bi-folder2-open me-1"></i>Projects
                </a>

                <a class="btn btn-outline-light btn-sm" href="/accounts/profile/">
                    <i class="bi bi-person me-1"></i>Profile
                </a>

                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>

            </div>
        </div>
    </div>
</nav>

<main class="container my-5 flex-grow-1">
    <div class="page-container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="text-center text-muted py-3 border-top bg-body">
    <small>&copy; 2025 Project Management App · Django & Bootstrap</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
    [...tooltipTriggerList].map(el => new bootstrap.Tooltip(el))
</script>

</body>
</html>
