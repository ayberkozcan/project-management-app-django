{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm p-3">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="avatar-md mx-auto mb-3 bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-person-plus fs-2"></i>
                    </div>
                    <h3 class="fw-bold">Join Us</h3>
                    <p class="text-muted small">Create an account to start managing your projects</p>
                </div>

                {% include "accounts/_auth_form.html" with form=form submit_text="Register" %}

                <div class="mt-4 text-center">
                    <p class="text-muted small mb-0">Already have an account? 
                        <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
