{% extends "base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm p-3">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="avatar-md mx-auto mb-3 bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock fs-2"></i>
                    </div>
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted small">Enter your credentials to access your account</p>
                </div>

                {% include "accounts/_auth_form.html" with form=form submit_text="Sign In" %}

                <div class="mt-4 text-center">
                    <p class="text-muted small mb-0">Don't have an account? 
                        <a href="{% url 'signup' %}" class="text-primary fw-bold text-decoration-none">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
