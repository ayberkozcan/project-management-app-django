name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: False
      DJANGO_ALLOWED_HOSTS: localhost

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Run Ruff
        run: ruff check . --select=E9,F63,F7,F82 --output-format=github

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Check Python bytecode compilation
        run: python -m compileall accounts config groups projects tasks

      - name: Run Django system checks
        run: python manage.py check

      - name: Run test suite
        run: python manage.py test accounts.tests projects.tests groups.tests
